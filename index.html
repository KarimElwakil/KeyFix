<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyFix — محوّل الكيبورد</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0d12;--s1:#111318;--s2:#181b23;--s3:#1e2230;
  --b0:rgba(255,255,255,0.05);--b1:rgba(255,255,255,0.1);--b2:rgba(255,255,255,0.18);
  --a1:#5b8fff;--a2:#8b5cf6;--a3:#06d6a0;
  --a1g:rgba(91,143,255,0.15);--a2g:rgba(139,92,246,0.15);
  --tx:#dde1ec;--tm:#8892a4;--td:#3a4155;
}
[data-theme="light"]{
  --bg:#f4f5f9;--s1:#ffffff;--s2:#eef0f6;--s3:#e4e7f0;
  --b0:rgba(0,0,0,0.06);--b1:rgba(0,0,0,0.1);--b2:rgba(0,0,0,0.18);
  --a1:#3b6ef6;--a2:#7c3aed;--a3:#05b88a;
  --a1g:rgba(59,110,246,0.12);--a2g:rgba(124,58,237,0.12);
  --tx:#1a1d2e;--tm:#5a6074;--td:#b0b6c8;
}
.theme-toggle{position:fixed;top:1rem;left:1rem;z-index:100;width:42px;height:42px;border-radius:50%;border:1px solid var(--b1);background:var(--s2);color:var(--tm);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);box-shadow:0 2px 12px rgba(0,0,0,.15)}
.theme-toggle:hover{border-color:var(--a1);color:var(--a1);box-shadow:0 0 20px var(--a1g);transform:scale(1.1) rotate(15deg)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
.bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(91,143,255,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(91,143,255,0.025) 1px,transparent 1px);background-size:48px 48px;animation:gridMove 25s linear infinite}
@keyframes gridMove{to{background-position:48px 48px}}
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.o1{width:500px;height:500px;background:var(--a2);opacity:.18;top:-150px;right:-150px;animation:orbFloat 15s ease-in-out infinite}
.o2{width:380px;height:380px;background:var(--a1);opacity:.13;bottom:-100px;left:-100px;animation:orbFloat 18s ease-in-out infinite reverse}
.o3{width:200px;height:200px;background:var(--a3);opacity:.1;top:50%;left:50%;margin:-100px 0 0 -100px;animation:orbFloat 10s ease-in-out infinite 3s}
@keyframes orbFloat{0%,100%{transform:translate(0,0)}33%{transform:translate(40px,-30px)}66%{transform:translate(-25px,20px)}}
.page{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:2rem 1rem 4rem}
/* HEADER */
.hdr{text-align:center;padding:2rem 0 2.5rem;animation:fadeUp .7s cubic-bezier(.16,1,.3,1) both}
.logo{width:72px;height:72px;border-radius:22px;margin:0 auto 1.2rem;background:linear-gradient(135deg,var(--a2),var(--a1));display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 0 50px rgba(139,92,246,.5),0 0 100px rgba(91,143,255,.2);animation:logoPulse 4s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 0 50px rgba(139,92,246,.5),0 0 100px rgba(91,143,255,.2)}50%{box-shadow:0 0 80px rgba(139,92,246,.7),0 0 160px rgba(91,143,255,.35)}}
.hdr h1{font-size:clamp(1.5rem,5vw,2.2rem);font-weight:600;letter-spacing:-.03em;background:linear-gradient(135deg,var(--tx) 40%,var(--a1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr .tag{color:var(--tm);font-size:.875rem;margin-top:.5rem;line-height:1.6}

/* MODE */
.mode-wrap{animation:fadeUp .7s .1s cubic-bezier(.16,1,.3,1) both}
.mode-bar{display:flex;gap:5px;padding:5px;background:var(--s1);border:1px solid var(--b0);border-radius:16px;margin-bottom:1rem}
.mb{flex:1;padding:10px 8px;border-radius:11px;border:none;background:transparent;color:var(--tm);font-size:13px;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1)}
.mb.on{background:linear-gradient(135deg,var(--a2),var(--a1));color:#fff;font-weight:500;box-shadow:0 0 24px rgba(139,92,246,.4)}
.mb:not(.on):hover{background:var(--s2);color:var(--tx)}
/* PANELS */
.panels-wrap{animation:fadeUp .7s .2s cubic-bezier(.16,1,.3,1) both}
.panel{background:var(--s1);border:1px solid var(--b0);border-radius:18px;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.panel:focus-within{border-color:rgba(91,143,255,.35);box-shadow:0 0 0 3px rgba(91,143,255,.07)}
.plabel{display:flex;align-items:center;gap:8px;padding:10px 16px 9px;font-size:11px;color:var(--tm);letter-spacing:.07em;text-transform:uppercase;border-bottom:1px solid var(--b0);user-select:none}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.d-blue{background:var(--a1);box-shadow:0 0 8px var(--a1)}
.d-green{background:var(--a3);box-shadow:0 0 8px var(--a3);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pl-r{margin-right:auto;display:flex;gap:6px;align-items:center}
.mini{font-size:10px;padding:2px 8px;border-radius:7px;border:1px solid var(--b1);background:transparent;color:var(--tm);cursor:pointer;font-family:'IBM Plex Sans Arabic',sans-serif;transition:all .2s}
.mini:hover{background:var(--s2);color:var(--tx)}
.ctr{font-size:10px;color:var(--td);font-family:'JetBrains Mono',monospace}
textarea{width:100%;border:none;outline:none;resize:none;padding:16px;font-size:16px;font-family:'IBM Plex Sans Arabic',sans-serif;background:transparent;color:var(--tx);min-height:130px;line-height:1.8}
textarea::placeholder{color:var(--td);font-size:14px}
/* OUTPUT - direction fix is here */
.out-box{padding:16px;font-size:16px;font-family:'IBM Plex Sans Arabic',sans-serif;min-height:130px;line-height:1.8;color:var(--tx);word-break:break-word;white-space:pre-wrap}
.out-box.dir-ar{direction:rtl;text-align:right;unicode-bidi:bidi-override}
.out-box.dir-en{direction:ltr;text-align:left;unicode-bidi:bidi-override}
.out-ph{color:var(--td);font-size:14px;font-style:italic;direction:rtl;display:block}
/* DIVIDER */
.divider{display:flex;align-items:center;justify-content:center;gap:12px;margin:10px 0}
.dline{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--b1),transparent)}
.swap-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--b1);background:var(--s2);color:var(--tm);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s cubic-bezier(.16,1,.3,1);flex-shrink:0}
.swap-btn:hover{border-color:var(--a1);color:var(--a1);box-shadow:0 0 20px var(--a1g);transform:rotate(180deg) scale(1.1)}
/* MIXED BAR */
.mixed-bar{display:none;margin-top:10px;background:var(--s1);border:1px solid rgba(139,92,246,.35);border-radius:18px;padding:14px 16px;animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both;box-shadow:0 0 24px rgba(139,92,246,.1)}
.mixed-bar.visible{display:block}
.mixed-label{font-size:12px;color:var(--tm);margin-bottom:10px;letter-spacing:.03em}
.mixed-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mixed-btn{border-radius:14px;border:1px solid var(--b1);background:var(--s2);padding:12px 10px;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);text-align:center;font-family:'IBM Plex Sans Arabic',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px}
.mixed-btn:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,.25)}
.mixed-ar:hover{border-color:var(--a2);box-shadow:0 8px 28px rgba(139,92,246,.25);background:var(--a2g)}
.mixed-en:hover{border-color:var(--a1);box-shadow:0 8px 28px rgba(91,143,255,.25);background:var(--a1g)}
.mixed-btn.selected-ar{border-color:var(--a2);background:var(--a2g);box-shadow:0 0 20px rgba(139,92,246,.3)}
.mixed-btn.selected-en{border-color:var(--a1);background:var(--a1g);box-shadow:0 0 20px rgba(91,143,255,.3)}
.mixed-icon{font-size:22px;margin-bottom:2px}
.mixed-txt{font-size:14px;font-weight:600;color:var(--tx)}
.mixed-sub{font-size:10px;color:var(--tm)}
/* STATS */
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px;animation:fadeUp .7s .35s cubic-bezier(.16,1,.3,1) both}
.stat{background:var(--s1);border:1px solid var(--b0);border-radius:14px;padding:12px 14px;transition:all .3s}
.stat:hover{border-color:var(--b1);transform:translateY(-2px)}
.sv{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:500;color:var(--tx)}
.sl{font-size:10px;color:var(--tm);margin-top:3px;letter-spacing:.04em}
/* TOOLS */
.tools-section{margin-top:1.25rem;animation:fadeUp .7s .45s cubic-bezier(.16,1,.3,1) both}
.tools-title{font-size:11px;color:var(--tm);letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
@media(min-width:480px){.tools-grid{grid-template-columns:repeat(4,1fr)}}
.tool-btn{background:var(--s1);border:1px solid var(--b0);border-radius:14px;padding:14px 10px;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1);text-align:center;font-family:'IBM Plex Sans Arabic',sans-serif}
.tool-btn:hover{border-color:var(--b2);background:var(--s2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.tool-btn:active{transform:scale(.97)}
.ti{font-size:20px;margin-bottom:5px;display:block}
.tn{font-size:12px;color:var(--tm)}
/* ACTIONS */
.actions{display:flex;gap:8px;margin-top:1rem;animation:fadeUp .7s .5s cubic-bezier(.16,1,.3,1) both}
.btn{padding:12px 18px;border-radius:14px;border:1px solid var(--b1);background:var(--s1);color:var(--tm);font-size:14px;font-family:'IBM Plex Sans Arabic',sans-serif;cursor:pointer;transition:all .25s cubic-bezier(.16,1,.3,1)}
.btn:hover{border-color:var(--b2);color:var(--tx);background:var(--s2);transform:translateY(-1px)}
.btn:active{transform:scale(.97)}
.btn-p{flex:2;background:linear-gradient(135deg,var(--a2),var(--a1));border-color:transparent;color:#fff;font-weight:500;box-shadow:0 4px 24px rgba(139,92,246,.3)}
.btn-p:hover{box-shadow:0 6px 36px rgba(139,92,246,.5);transform:translateY(-2px);color:#fff;background:linear-gradient(135deg,var(--a2),var(--a1))}
.btn-p.ok{background:linear-gradient(135deg,#059669,var(--a3));box-shadow:0 4px 24px rgba(6,214,160,.3)}
.sc{text-align:center;margin-top:.9rem;color:var(--td);font-size:11px;animation:fadeUp .7s .6s cubic-bezier(.16,1,.3,1) both}
.sc kbd{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--s2);border:1px solid var(--b1);border-radius:4px;padding:1px 5px;color:var(--tm)}
/* EXAMPLES */
.ex{margin-top:.8rem;background:var(--s1);border:1px solid var(--b0);border-radius:12px;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;animation:fadeUp .7s .65s cubic-bezier(.16,1,.3,1) both}
.ex-l{font-size:11px;color:var(--td)}
.ex-c{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:3px 8px;color:var(--a1);cursor:pointer;transition:all .2s}
.ex-c:hover{background:var(--s3);border-color:var(--a1);box-shadow:0 0 12px var(--a1g)}
/* LANG BADGE */
.lbadge{display:none;font-size:10px;padding:2px 8px;border-radius:12px;font-weight:500}
.lbadge.ar{display:inline-flex;background:rgba(139,92,246,.15);color:var(--a2);border:1px solid rgba(139,92,246,.3)}
.lbadge.en{display:inline-flex;background:rgba(91,143,255,.12);color:var(--a1);border:1px solid rgba(91,143,255,.3)}
/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s2);border:1px solid var(--b2);color:var(--tx);font-size:13px;padding:10px 22px;border-radius:50px;opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.16,1,.3,1);z-index:999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes charIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.ca{display:inline;animation:charIn .12s ease both}
@media(max-width:480px){
  .page{padding:1rem .75rem 3rem}
  .hdr{padding:1.2rem 0 1.8rem}
  .logo{width:58px;height:58px;font-size:22px}
  .hdr h1{font-size:1.35rem}
  .sv{font-size:18px}
  .actions{flex-direction:column}
  .btn-p,.btn{width:100%}
  .mb{font-size:12px;padding:9px 5px}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
<div class="toast" id="toast"></div>
<button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="تغيير المظهر">🌙</button>
<div class="page">
  <div class="hdr">
    <div class="logo">⌨️</div>
    <h1>KeyFix — محوّل الكيبورد</h1>
    <p class="tag">كتبت بالكيبورد الغلط؟ الصق النص وهيتصلح في ثانية<br>مش ترجمة — تحويل حروف بالموضع على الكيبورد بالظبط</p>

  </div>
  <div class="mode-wrap">
    <div class="mode-bar">
      <button class="mb on" id="btn-auto" onclick="setMode('auto')">⚡ تلقائي</button>
      <button class="mb" id="btn-en2ar" onclick="setMode('en2ar')">EN ← عربي</button>
      <button class="mb" id="btn-ar2en" onclick="setMode('ar2en')">عربي ← EN</button>
    </div>
  </div>
  <div class="panels-wrap">
    <div class="panel">
      <div class="plabel">
        <span class="dot d-blue"></span>النص المكتوب
        <span class="lbadge" id="lbadge"></span>
        <span class="pl-r">
          <span class="ctr" id="cin">0</span>
          <button class="mini" onclick="pasteClip()">لصق</button>
          <button class="mini" onclick="clearAll()">مسح</button>
        </span>
      </div>
      <textarea id="inp" placeholder="الصق هنا النص اللي كتبته بالكيبورد الغلط..." oninput="onInput()" onkeydown="hotkey(event)"></textarea>
    </div>
    <div class="divider">
      <div class="dline"></div>
      <button class="swap-btn" onclick="swapText()" title="تبديل">⇅</button>
      <div class="dline"></div>
    </div>
    <div class="panel">
      <div class="plabel">
        <span class="dot d-green"></span>النتيجة
        <span class="pl-r">
          <span class="ctr" id="cout">0</span>
          <button class="mini" onclick="copyOut()">نسخ</button>
        </span>
      </div>
      <div class="out-box" id="out"><span class="out-ph">النتيجة هتظهر هنا فور ما تكتب...</span></div>
    </div>
  </div>
  <!-- MIXED TEXT CHOICE BAR -->
  <div class="mixed-bar" id="mixedBar">
    <div class="mixed-label">🔀 نص مختلط — اختار عايزه يبقى:</div>
    <div class="mixed-btns">
      <button class="mixed-btn mixed-ar" onclick="unifyTo('ar')">
        <span class="mixed-icon">🇪🇬</span>
        <span class="mixed-txt">كله عربي</span>
        <span class="mixed-sub">تحويل الإنجليزي → عربي</span>
      </button>
      <button class="mixed-btn mixed-en" onclick="unifyTo('en')">
        <span class="mixed-icon">🔤</span>
        <span class="mixed-txt">كله إنجليزي</span>
        <span class="mixed-sub">تحويل العربي → إنجليزي</span>
      </button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="sv" id="s-in">0</div><div class="sl">حرف دخل</div></div>
    <div class="stat"><div class="sv" id="s-out">0</div><div class="sl">حرف خرج</div></div>
    <div class="stat"><div class="sv" id="s-mode" style="font-size:13px;padding-top:5px">تلقائي</div><div class="sl">الوضع</div></div>
  </div>
  <div class="tools-section">
    <div class="tools-title">أدوات إضافية</div>
    <div class="tools-grid">
      <button class="tool-btn" onclick="toolSpaces()"><span class="ti">✂️</span><span class="tn">حذف مسافات زيادة</span></button>
      <button class="tool-btn" onclick="toolLines()"><span class="ti">📋</span><span class="tn">تنظيف الأسطر</span></button>
      <button class="tool-btn" onclick="toolReverse()"><span class="ti">🔄</span><span class="tn">عكس النص</span></button>
      <button class="tool-btn" onclick="toolCopyClear()"><span class="ti">⚡</span><span class="tn">نسخ ومسح</span></button>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-p" id="cbtn" onclick="copyOut()">نسخ النتيجة</button>
    <button class="btn" onclick="clearAll()">مسح الكل</button>
  </div>
  <div class="sc"><kbd>Ctrl</kbd> + <kbd>Enter</kbd> لنسخ النتيجة سريعاً</div>

</div>
<script>
const E2A={q:'ض',w:'ص',e:'ث',r:'ق',t:'ف',y:'غ',u:'ع',i:'ه',o:'خ',p:'ح','[':'ج',']':'د',a:'ش',s:'س',d:'ي',f:'ب',g:'ل',h:'ا',j:'ت',k:'ن',l:'م',';':'ك',"'":'ط',z:'ئ',x:'ء',c:'ؤ',v:'ر',b:'لا',n:'ى',m:'ة',',':'و','.':'ز','/':'ظ',Q:'ض',W:'ص',E:'ث',R:'ق',T:'ف',Y:'غ',U:'ع',I:'ه',O:'خ',P:'ح','{':'ج','}':'د',A:'ش',S:'س',D:'ي',F:'ب',G:'ل',H:'ا',J:'ت',K:'ن',L:'م',':':'ك','"':'ط',Z:'ئ',X:'ء',C:'ؤ',V:'ر',B:'لا',N:'ى',M:'ة','<':'و','>':'ز','?':'ظ','`':'ذ','~':'ذ'};
const A2E={};
for(const[k,v]of Object.entries(E2A))if(!A2E[v])A2E[v]=k;
A2E['ذ']='`';A2E['لا']='b';A2E['آ']='h';A2E['أ']='h';A2E['إ']='h';

let mode='auto',lastOut='',dbt=null;

function e2a(t){let o='';for(const c of t)o+=E2A[c]??c;return o}
function a2e(t){let i=0,o='';while(i<t.length){const two=t[i]+(t[i+1]??'');if(A2E[two]){o+=A2E[two];i+=2}else if(A2E[t[i]]){o+=A2E[t[i]];i++}else{o+=t[i];i++}}return o}
function detect(t){let ar=0,en=0;for(const c of t){if(/[\u0600-\u06FF]/.test(c))ar++;else if(/[a-zA-Z]/.test(c))en++}return ar>=en?'ar':'en'}
function isMixed(t){let ar=0,en=0;for(const c of t){if(/[\u0600-\u06FF]/.test(c))ar++;else if(/[a-zA-Z]/.test(c))en++}const total=ar+en;if(total<3)return false;const ratio=Math.min(ar,en)/total;return ratio>0.1}

function showMixedBar(show){
  const bar=document.getElementById('mixedBar');
  if(show){bar.classList.add('visible')}else{bar.classList.remove('visible');bar.querySelectorAll('.mixed-btn').forEach(b=>b.classList.remove('selected-ar','selected-en'))}
}

function unifyTo(target){
  const val=document.getElementById('inp').value;
  if(!val.trim())return;
  // Convert word by word — Arabic words → EN, or EN words → AR depending on target
  const tokens=val.split(/(\s+)/);
  const result=tokens.map(token=>{
    if(/^\s+$/.test(token))return token;
    const hasAr=/[\u0600-\u06FF]/.test(token);
    const hasEn=/[a-zA-Z]/.test(token);
    if(target==='ar'&&hasEn&&!hasAr)return e2a(token);
    if(target==='en'&&hasAr&&!hasEn)return a2e(token);
    return token;
  }).join('');
  lastOut=result;
  document.getElementById('cout').textContent=result.length;
  document.getElementById('s-out').textContent=result.length;
  document.getElementById('s-mode').textContent=target==='ar'?'توحيد عربي':'توحيد إنجليزي';
  render(result,target);
  // Highlight selected button
  document.querySelectorAll('.mixed-btn').forEach(b=>b.classList.remove('selected-ar','selected-en'));
  document.querySelector(target==='ar'?'.mixed-ar':'.mixed-en').classList.add(target==='ar'?'selected-ar':'selected-en');
  showToast(target==='ar'?'تم التوحيد — كله عربي ✓':'تم التوحيد — كله إنجليزي ✓');
}

function render(text,dir){
  const el=document.getElementById('out');
  if(!text){el.innerHTML='<span class="out-ph">النتيجة هتظهر هنا فور ما تكتب...</span>';el.className='out-box';return}
  // Set direction based on OUTPUT language — this is what fixes the broken text
  el.className='out-box '+(dir==='ar'?'dir-ar':'dir-en');
  const chars=[...text];
  const anim=chars.length<=120;
  el.innerHTML='';
  chars.forEach((ch,i)=>{
    const s=document.createElement('span');
    if(anim){s.className='ca';s.style.animationDelay=Math.min(i*6,200)+'ms'}
    s.textContent=ch;
    el.appendChild(s);
  });
}

function doConvert(){
  const val=document.getElementById('inp').value;
  document.getElementById('cin').textContent=val.length;
  document.getElementById('s-in').textContent=val.length;
  const badge=document.getElementById('lbadge');
  if(!val.trim()){render('','');document.getElementById('cout').textContent='0';document.getElementById('s-out').textContent='0';badge.className='lbadge';lastOut='';showMixedBar(false);return}
  // Show mixed bar if text is mixed, regardless of mode
  showMixedBar(isMixed(val));
  let result='',outDir='';
  if(mode==='auto'){
    const lang=detect(val);
    result=lang==='ar'?a2e(val):e2a(val);
    outDir=lang==='ar'?'en':'ar';
    document.getElementById('s-mode').textContent=lang==='ar'?'عربي→إنج':'إنج→عربي';
    badge.className='lbadge '+(lang==='ar'?'ar':'en');
    badge.textContent=lang==='ar'?'عربي':'English';
  }else if(mode==='en2ar'){result=e2a(val);outDir='ar';badge.className='lbadge'}
  else{result=a2e(val);outDir='en';badge.className='lbadge'}
  lastOut=result;
  document.getElementById('cout').textContent=result.length;
  document.getElementById('s-out').textContent=result.length;
  render(result,outDir);
}

function onInput(){clearTimeout(dbt);dbt=setTimeout(doConvert,60)}
function hotkey(e){if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();copyOut()}}

function setMode(m){
  mode=m;
  ['auto','en2ar','ar2en'].forEach(id=>document.getElementById('btn-'+id).classList.toggle('on',m===id));
  document.getElementById('s-mode').textContent={auto:'تلقائي','en2ar':'إنج→عربي','ar2en':'عربي→إنج'}[m];
  doConvert();
}

function copyOut(){
  if(!lastOut)return;
  const btn=document.getElementById('cbtn');
  const ok=()=>{btn.textContent='✓ تم النسخ';btn.classList.add('ok');showToast('تم نسخ النتيجة ✓');setTimeout(()=>{btn.textContent='نسخ النتيجة';btn.classList.remove('ok')},2200)};
  navigator.clipboard.writeText(lastOut).then(ok).catch(()=>{fbCopy(lastOut);ok()});
}
function fbCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
function swapText(){if(!lastOut)return;document.getElementById('inp').value=lastOut;doConvert()}
function clearAll(){document.getElementById('inp').value='';lastOut='';doConvert()}
async function pasteClip(){try{const t=await navigator.clipboard.readText();document.getElementById('inp').value=t;doConvert()}catch{showToast('السماح بالوصول للكليبورد مطلوب')}}

function toolSpaces(){const el=document.getElementById('inp');el.value=el.value.replace(/[ \t]+/g,' ').trim();doConvert();showToast('تم حذف المسافات الزيادة ✓')}
function toolLines(){const el=document.getElementById('inp');el.value=el.value.split('\n').map(l=>l.trim()).filter(l=>l).join('\n');doConvert();showToast('تم تنظيف الأسطر ✓')}
function toolReverse(){const el=document.getElementById('inp');el.value=[...el.value].reverse().join('');doConvert();showToast('تم عكس النص ✓')}
function toolCopyClear(){copyOut();setTimeout(clearAll,350)}
function tryEx(txt){document.getElementById('inp').value=txt;doConvert();document.getElementById('inp').focus()}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

function toggleTheme(){
  const html=document.documentElement;
  const isDark=html.getAttribute('data-theme')!=='light';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeBtn').textContent=isDark?'☀️':'🌙';
  localStorage.setItem('kf-theme',isDark?'light':'dark');
}
(function(){
  const saved=localStorage.getItem('kf-theme');
  if(saved==='light'){document.documentElement.setAttribute('data-theme','light');document.getElementById('themeBtn').textContent='☀️';}
})();
</script>
</body>
